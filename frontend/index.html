<!DOCTYPE html>

<html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Obsidian Relay</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div id="navbar-text">HELLO USER - WELCOME TO OBSIDIAN RELAY!</div>

        <div class="nav-links">
            <button onclick="goTo('index.html')" class="nav-relay">⚛ RELAY</button>
            <button onclick="goTo('marketplace.html')">MARKET</button>
            <button onclick="goTo('inventory.html')">HANGAR</button>
            <button onclick="goTo('transactions.html')">TRADE</button>
            <button onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <!-- MAIN RELAY -->
    <div class="relay-container">

        <img src="../../media/website_img/login_bg.png" class="relay-bg" alt="Relay Background">

        <div class="relay-points">
            <!-- TOP ROW -->
            <div class="relay-row top-row">
                <button onclick="goTo('inventory.html')" class="point hangar">HANGAR</button>
                <button onclick="goTo('marketplace.html')" class="point market">MARKET</button>
                <button onclick="goTo('#')" class="point habitat">HABITAT</button>
            </div>

            <!-- MIDDLE ROW -->
            <div class="relay-row middle-row">
                <button onclick="goTo('transactions.html')" class="point trade">TRADE</button>
                <button onclick="goTo('#')" class="point plaza">⚛ PLAZA</button>
                <button onclick="goTo('#')" class="point archive">ARCHIVE</button>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script>
        // Animate navbar text on load
        window.addEventListener('load', () => {
            const text = document.getElementById('navbar-text');
            text.style.animation = 'none';
            setTimeout(() => {
                text.style.animation = 'textGlow 2s ease-in-out infinite';
            }, 100);
        });
    </script>
</body>
</html>
