<!-- Login and registration page -->
 
<link rel="stylesheet" href="css/style.css">

<div class="login-container">

    <!-- Background handled by CSS -->
    <div class="login-box">
        
        <!-- Switch between login and registration -->
        <div class="tabs">
            <button onclick="showLogin()" class="tab-btn login-tab">
                <div class="login-icon"></div>
                <span>LOGIN</span>
            </button>
            <button onclick="showRegister()" class="tab-btn register-tab">
                <div class="register-icon"></div>
                <span>REGISTER</span>
            </button>
        </div>

        <!-- Login -->
        <div id="loginForm">
            <input id="loginUsername" placeholder="Username">
            <input id="loginPassword" type="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>
        <!-- Registration -->
        <div id="registerForm" style="display:none;">
            <input id="registerEmail" placeholder="Email">
            <input id="registerUsername" placeholder="Username">
            <input id="registerPassword" type="password" placeholder="Password">
            <button onclick="register()">Register</button>
        </div>

        <!-- Status text for login/registration feedback -->
        <div id="statusText"></div>

    </div>

</div>

<!-- Include API and auth scripts -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
